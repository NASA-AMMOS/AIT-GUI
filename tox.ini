[tox]
allowlist_externals = poetry
envlist =
    docs
    lint

isolated_build = True

[testenv:docs]
allowlist_externals = poetry
commands_pre =
    poetry install
commands =
    poetry run sphinx-build doc/source doc/build
basepython = python3.11
passenv = AIT_ROOT
    AIT_CONFIG
[testenv:lint]
commands_pre =
    poetry install
commands=
    python -m pre_commit run --color=always {posargs:--all}
basepython = python3.11

[testenv:distcheck]
skip_install = true
deps =
    twine
    poetry
commands =
    poetry build
    poetry run twine check dist/*
